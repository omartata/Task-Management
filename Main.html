<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام مهام الجمعية · SFC Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#1F5C38; --green-d:#164227; --gold:#C9A227; --orange:#E85200;
  --muted:#5c6b63; --bg:#f4f6f4; --card:#ffffff; --line:#e2e8e4;
  --text:#1b2620; --radius:12px; --green-soft:#e8f2ea;
  --shadow:0 1px 2px rgba(32,48,42,.06),0 8px 24px rgba(32,48,42,.06);
  --new:#64748b; --prog:#C9A227; --review:#7c5cbf; --done:#1F5C38; --blocked:#E85200;
}
[data-theme="dark"]{
  --green:#4f9d6f; --green-d:#3b7a53; --gold:#d9b84a; --orange:#ff6a1f;
  --muted:#9aa8a0; --bg:#0f1512; --card:#1a221d; --line:#2a352e; --text:#e8ede9; --green-soft:#1e2c24;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ---------- Login ---------- */
/* ===== LOGIN — exact copy of SFC Report System login styling ===== */
#login{
  /* reference palette, scoped to the login only */
  --lg-green:#3f8f52; --lg-green-deep:#2c6b3c; --lg-green-soft:#e8f2ea;
  --lg-sand:#f6f4ee; --lg-card:#ffffff; --lg-ink:#20302a; --lg-ink-soft:#5c6b63;
  --lg-line:#e4e6e1;
  --lg-shadow:0 1px 2px rgba(32,48,42,.06),0 8px 24px rgba(32,48,42,.06);
  font-family:"Segoe UI","Tahoma",system-ui,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1200px 600px at 50% -10%, var(--lg-green-soft), var(--lg-sand));
}
[data-theme="dark"] #login{
  --lg-green:#4ea365; --lg-green-deep:#2f6b3f; --lg-green-soft:#1e2c24;
  --lg-sand:#141a17; --lg-card:#1b231e; --lg-ink:#e7ede9; --lg-ink-soft:#93a29a;
  --lg-line:#2a332d;
  --lg-shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
}
.login-card{background:var(--lg-card);border:1px solid var(--lg-line);border-radius:20px;box-shadow:var(--lg-shadow);
  width:100%;max-width:400px;padding:34px 30px;animation:cardUp .55s cubic-bezier(.2,.8,.2,1) both}
@keyframes cardUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.login-brand{text-align:center;margin-bottom:24px}
.login-brand h1{font-family:"Segoe UI","Tahoma",system-ui,sans-serif;font-size:20px;color:var(--lg-ink);margin-top:12px;font-weight:700}
.login-sub{font-family:"Segoe UI","Tahoma",system-ui,sans-serif;font-size:10.5px;color:var(--lg-green);font-weight:700;letter-spacing:1.2px;margin-top:6px;text-transform:uppercase}
#login .field{text-align:start;margin-bottom:14px}
#login .field label{display:block;font-size:12.5px;font-weight:700;color:var(--lg-ink-soft);margin-bottom:5px}
#login .field input{
  border:1px solid var(--lg-line);border-radius:9px;padding:9px 11px;font-size:13.5px;
  background:var(--lg-card);color:var(--lg-ink);outline:none;transition:.15s;width:100%;
}
#login .field input:focus{border-color:var(--lg-green);box-shadow:0 0 0 3px var(--lg-green-soft)}
/* reference dark-mode overrides: inputs and theme button use #222b25 */
[data-theme="dark"] #login .field input{background:#222b25;color:var(--lg-ink)}
[data-theme="dark"] #login .theme-btn{background:#222b25;border-color:var(--lg-line)}
[data-theme="dark"] #login .lang-pill{background:#222b25;border-color:var(--lg-line)}
[data-theme="dark"] #login .lang-pill.on{background:var(--lg-green);border-color:var(--lg-green)}
#login .err{color:#c0492f;font-size:13px;font-weight:600;min-height:18px;text-align:center;margin:4px 0}
#login .btn{border:0;border-radius:10px;width:100%;justify-content:center;padding:12px;font-size:15px;font-weight:700;
  margin-top:6px;background:var(--lg-green);color:#fff;transition:.15s;display:inline-flex;align-items:center;gap:7px}
#login .btn:hover{background:var(--lg-green-deep)}
/* ---- animated people logo (draw arc, pop dots, gentle float) ---- */
.login-logo{overflow:visible;margin:0 auto;display:block}
.login-logo .ll-arc{stroke-dasharray:60;stroke-dashoffset:60;animation:drawArc .8s ease-out .15s forwards}
@keyframes drawArc{to{stroke-dashoffset:0}}
.login-logo .ll-dot{transform-box:fill-box;transform-origin:center;opacity:0;animation:popDot .5s cubic-bezier(.34,1.56,.64,1) forwards}
.login-logo .ll-dot1{animation-delay:.5s}
.login-logo .ll-dot2{animation-delay:.68s}
.login-logo .ll-dot3{animation-delay:.86s}
@keyframes popDot{0%{opacity:0;transform:scale(0)}60%{opacity:1;transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}
.login-logo{animation:floatLogo 3.2s ease-in-out 1.3s infinite}
@keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media(prefers-reduced-motion:reduce){.login-logo,.login-logo *,.login-card{animation:none!important;opacity:1!important;stroke-dashoffset:0!important;transform:none!important}}
/* ---- login controls: theme button + language pills (reference layout) ---- */
.login-controls{display:flex;align-items:center;gap:8px;margin-top:18px;direction:ltr}
.theme-btn{display:flex;align-items:center;justify-content:center;width:36px;height:32px;background:var(--lg-sand);border:1px solid var(--lg-line);border-radius:9px;color:var(--lg-ink-soft);cursor:pointer;transition:.15s;flex-shrink:0;padding:0}
.theme-btn:hover{color:var(--lg-green);border-color:var(--lg-green)}
.theme-btn svg{width:19px;height:19px;display:block}
.theme-btn .ico-moon{display:none}
[data-theme="dark"] .theme-btn .ico-sun{display:none}
[data-theme="dark"] .theme-btn .ico-moon{display:block}
.lang-pills{display:flex;gap:8px;justify-content:center;align-items:center;margin:0;flex:1}
.lang-pill{background:transparent;border:1px solid var(--lg-line);border-radius:8px;padding:5px 14px;font-size:12.5px;font-weight:700;color:var(--lg-ink-soft);cursor:pointer;transition:.15s}
.lang-pill:hover{border-color:var(--lg-green);color:var(--lg-green)}
.lang-pill.on{background:var(--lg-green);color:#fff;border-color:var(--lg-green)}
.field{text-align:start;margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.field input:focus{outline:none;border-color:var(--green)}
.btn{background:var(--green);color:#fff;border:none;padding:12px 20px;border-radius:var(--radius);font-weight:600;font-size:14px;width:100%;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn.sec{background:transparent;color:var(--green);border:1px solid var(--green)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);width:auto}
.btn.sm{padding:7px 14px;font-size:13px;width:auto}
.err{color:var(--orange);font-size:13px;margin-top:10px;min-height:18px}

/* ---------- App shell ---------- */
#app{display:none;min-height:100vh}
header.top{background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
.top .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--green)}
.top .brand .dot{width:34px;height:34px;border-radius:50%;background:var(--green);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden}
.top .brand .dot svg{width:26px;height:26px;margin-top:3px}
.top .spacer{flex:1}
.top .user{font-size:13px;color:var(--muted);text-align:end}
.top .user b{display:block;color:var(--text);font-size:14px}
.role-chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(31,92,56,.12);color:var(--green);font-weight:600}
.icon-btn{background:transparent;border:1px solid var(--line);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.icon-btn:hover{background:var(--bg)}

.wrap{max-width:1200px;margin:0 auto;padding:22px}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.toolbar h2{font-size:20px;color:var(--text);margin-inline-end:auto}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.view-toggle button{background:var(--card);border:none;padding:8px 14px;font-size:13px;color:var(--muted);font-weight:600}
.view-toggle button.active{background:var(--green);color:#fff}
select.filter{padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text)}

/* ---------- Metric cards ---------- */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--line)}
.metric .n{font-size:26px;font-weight:700;color:var(--green)}
.metric .l{font-size:12px;color:var(--muted)}

/* ---------- Kanban ---------- */
#kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
.col{background:var(--card);border-radius:var(--radius);padding:12px;min-width:200px;min-height:120px;border:1px solid var(--line)}
.col.drag-over{border-color:var(--green);background:rgba(31,92,56,.05)}
.col-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid}
.col-head .cnt{margin-inline-start:auto;background:var(--bg);color:var(--muted);font-size:11px;padding:1px 8px;border-radius:20px;font-weight:600}
.card{background:var(--bg);border-radius:10px;padding:11px 12px;margin-bottom:9px;cursor:grab;border:1px solid var(--line)}
.card:active{cursor:grabbing}
.card .t{font-weight:600;font-size:14px;margin-bottom:6px}
.card .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.pri{padding:1px 7px;border-radius:6px;font-weight:600;font-size:10px}
.pri.high{background:rgba(232,82,0,.15);color:var(--orange)}
.pri.med{background:rgba(201,162,39,.18);color:#9a7a10}
.pri.low{background:rgba(100,116,139,.15);color:var(--muted)}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.prog-bar{height:5px;background:var(--line);border-radius:4px;margin-top:8px;overflow:hidden}
.prog-bar i{display:block;height:100%;background:var(--gold)}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;background:var(--card);border-radius:var(--radius);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
th{text-align:start;padding:12px 14px;color:var(--muted);font-size:12px;font-weight:600;border-bottom:1px solid var(--line);background:var(--bg)}
td{padding:12px 14px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
tr.row:hover{background:var(--bg);cursor:pointer}
.status-tag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;color:#fff}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow-y:auto}
.modal{background:var(--card);border-radius:16px;padding:26px;width:100%;max-width:560px;margin:auto}
.modal h3{color:var(--green);font-size:19px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.modal .close{margin-inline-start:auto;background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:80px}
.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.match{background:rgba(31,92,56,.08);border:1px solid rgba(31,92,56,.2);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--green);margin-top:6px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.skill-tag{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:11px;margin:2px;color:var(--muted)}

/* detail modal parts */
.detail-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.detail-row .k{color:var(--muted);min-width:110px}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:6px;font-size:13px}
.file-item a{color:var(--green);text-decoration:none;margin-inline-start:auto}
.comment{padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.comment .who{font-weight:600;font-size:12px;color:var(--green)}
.comment .when{color:var(--muted);font-size:11px}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1}
.log-item{font-size:12px;color:var(--muted);padding:4px 0}

/* ---------- Responsive: tablets (iPad) ---------- */
.modal{max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#kanban{-webkit-overflow-scrolling:touch}
.table-wrap{-webkit-overflow-scrolling:touch}
@media(max-width:1080px){
  .wrap{padding:18px}
  #kanban{grid-template-columns:repeat(5,minmax(190px,1fr));overflow-x:auto;scroll-snap-type:x proximity;padding-bottom:6px}
  .col{scroll-snap-align:start}
}
/* ---------- Responsive: phones ---------- */
@media(max-width:760px){
  /* Kanban becomes a swipeable horizontal board (one column ≈ one screen) */
  #kanban{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px}
  #kanban .col{flex:0 0 84vw;min-width:84vw;scroll-snap-align:center}
  .grid2{grid-template-columns:1fr}
  .wrap{padding:12px}
  .top{padding:8px 12px;gap:8px}
  .top .user b{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .metric{padding:12px}
  .metric .n{font-size:21px}
  .toolbar{gap:8px}
  .toolbar h2{font-size:17px;width:100%}
  select.filter{flex:1;min-width:0}
  .overlay{padding:12px 8px}
  .modal{padding:18px 16px;border-radius:14px}
  /* comfortable touch targets */
  .btn,.icon-btn,.view-toggle button,.lang-pill,.theme-btn{min-height:42px}
  .card{padding:13px 14px}
  /* prevent iOS auto-zoom on focus: inputs must be ≥16px */
  input,select,textarea{font-size:16px!important}
}
@media(max-width:400px){
  #kanban .col{flex-basis:92vw;min-width:92vw}
  .top .user{display:none}
}
</style>
</head>
<body data-theme="light">

<!-- SETUP BANNER (shown until config filled) -->
<div id="setup" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:100;padding:40px 20px;overflow-y:auto">
  <div style="max-width:640px;margin:0 auto;background:var(--card);border-radius:16px;padding:30px">
    <h2 style="color:var(--green);margin-bottom:14px" data-i18n="quickSetup">إعداد سريع</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px" data-i18n="setupHint">أدخل بيانات مشروع Supabase الجديد ثم اضغط بدء.</p>
    <div class="field"><label>Supabase URL</label><input id="cfgUrl" placeholder="https://xxxx.supabase.co"></div>
    <div class="field"><label data-i18n="pubKey">Supabase publishable key</label><input id="cfgKey" placeholder="sb_publishable_..."></div>
    <button class="btn" onclick="saveConfig()" data-i18n="start">بدء</button>
    <p style="color:var(--muted);font-size:12px;margin-top:14px" data-i18n="setupNote">تُحفظ محلياً في المتصفح. سيُطلب تشغيل ملف SQL في Supabase أولاً.</p>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-brand">
      <svg class="login-logo" width="60" height="60" viewBox="0 0 40 40">
        <path class="ll-arc" d="M8 34c0-7 5-12 12-12s12 5 12 12" stroke="var(--lg-green)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <circle class="ll-dot ll-dot1" cx="9"  cy="15" r="3.4" fill="#4a9c5c"/>
        <circle class="ll-dot ll-dot2" cx="20" cy="11" r="5"   fill="#7fc08e"/>
        <circle class="ll-dot ll-dot3" cx="31" cy="15" r="3.4" fill="var(--gold)"/>
      </svg>
      <h1 data-i18n="appName">نظام مهام الجمعية</h1>
      <div class="login-sub"><span data-i18n="orgName">جمعية أصدقاء السعودية</span> · <span data-i18n="taskMgmt">إدارة المهام</span></div>
    </div>
    <div class="field"><label data-i18n="email">البريد الإلكتروني</label><input id="email" type="email" autocomplete="email"></div>
    <div class="field"><label data-i18n="password">كلمة المرور</label><input id="password" type="password" autocomplete="current-password"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="doLogin()" data-i18n="signIn">تسجيل الدخول</button>
    <div class="login-controls">
      <button class="theme-btn" onclick="toggleTheme()" data-i18n-title="darkMode" title="الوضع الليلي">
        <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <div class="lang-pills">
        <button class="lang-pill" data-lang="ar" onclick="setLang('ar')">عربي</button>
        <button class="lang-pill" data-lang="en" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="top">
    <div class="brand">
      <span class="dot"><svg viewBox="0 0 40 40" fill="none"><path d="M8 34c0-7 5-12 12-12s12 5 12 12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="15" r="3.4" fill="#7fc08e"/><circle cx="20" cy="11" r="5" fill="#fff"/><circle cx="31" cy="15" r="3.4" fill="var(--gold)"/></svg></span>
      <span data-i18n="appName">نظام مهام الجمعية</span>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" onclick="toggleLang()" id="langBtn" title="Language / اللغة" style="font-weight:700;font-size:12px">EN</button>
    <button class="icon-btn" onclick="toggleTheme()" data-i18n-title="darkMode" title="الوضع الليلي">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
    </button>
    <div class="user"><b id="uName">—</b><span class="role-chip" id="uRole">—</span></div>
    <button class="icon-btn" onclick="doLogout()" data-i18n-title="logout" title="خروج">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </header>

  <div class="wrap">
    <div class="metrics" id="metrics"></div>

    <div class="toolbar">
      <h2 data-i18n="taskBoard">لوحة المهام</h2>
      <select class="filter" id="fAssignee" onchange="render()"><option value="" data-i18n="allPeople">كل الأشخاص</option></select>
      <select class="filter" id="fPriority" onchange="render()">
        <option value="" data-i18n="allPriorities">كل الأولويات</option>
        <option value="high" data-i18n="priHigh">عالية</option>
        <option value="med" data-i18n="priMed">متوسطة</option>
        <option value="low" data-i18n="priLow">منخفضة</option>
      </select>
      <div class="view-toggle">
        <button id="tabKanban" class="active" onclick="setView('kanban')" data-i18n="kanban">لوحة</button>
        <button id="tabTable" onclick="setView('table')" data-i18n="table">جدول</button>
      </div>
      <button class="btn sm" id="newBtn" onclick="openTaskModal()" style="width:auto" data-i18n="newTask">+ مهمة جديدة</button>
    </div>

    <div id="kanban"></div>
    <div id="table" class="hidden"><div class="table-wrap"><table>
      <thead><tr><th data-i18n="task">المهمة</th><th data-i18n="assignee">المسؤول</th><th data-i18n="priority">الأولوية</th><th data-i18n="status">الحالة</th><th data-i18n="progress">التقدم</th><th data-i18n="due">الاستحقاق</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table></div></div>
  </div>
</div>

<div id="modalHost"></div>

<script>
/* ============ CONFIG ============ */
let SB=null, cfg=JSON.parse(localStorage.getItem('sfc_task_cfg')||'null');
let me=null, members=[], tasks=[], currentView='kanban';
let LANG=localStorage.getItem('sfc_lang')||'ar';

/* ============ I18N DICTIONARY ============ */
const I18N={
  appName:{ar:'نظام مهام الجمعية',en:'SFC Tasks'},
  orgName:{ar:'جمعية أصدقاء السعودية',en:'Saudi Friends Association'},
  taskMgmt:{ar:'إدارة المهام',en:'Task Management'},
  email:{ar:'البريد الإلكتروني',en:'Email'},
  password:{ar:'كلمة المرور',en:'Password'},
  signIn:{ar:'تسجيل الدخول',en:'Sign in'},
  darkMode:{ar:'الوضع الليلي',en:'Dark mode'},
  logout:{ar:'خروج',en:'Log out'},
  taskBoard:{ar:'لوحة المهام',en:'Task board'},
  allPeople:{ar:'كل الأشخاص',en:'All people'},
  allPriorities:{ar:'كل الأولويات',en:'All priorities'},
  priHigh:{ar:'عالية',en:'High'},
  priMed:{ar:'متوسطة',en:'Medium'},
  priLow:{ar:'منخفضة',en:'Low'},
  kanban:{ar:'لوحة',en:'Kanban'},
  table:{ar:'جدول',en:'Table'},
  newTask:{ar:'+ مهمة جديدة',en:'+ New task'},
  task:{ar:'المهمة',en:'Task'},
  assignee:{ar:'المسؤول',en:'Assignee'},
  priority:{ar:'الأولوية',en:'Priority'},
  status:{ar:'الحالة',en:'Status'},
  progress:{ar:'التقدم',en:'Progress'},
  due:{ar:'الاستحقاق',en:'Due'},
  quickSetup:{ar:'إعداد سريع',en:'Quick setup'},
  setupHint:{ar:'أدخل بيانات مشروع Supabase الجديد ثم اضغط بدء.',en:'Paste your new Supabase project URL and publishable key.'},
  pubKey:{ar:'مفتاح Supabase العام',en:'Supabase publishable key'},
  start:{ar:'بدء',en:'Start'},
  setupNote:{ar:'تُحفظ محلياً في المتصفح. شغّل ملف SQL في Supabase أولاً.',en:'Saved locally in your browser. Run the SQL file in Supabase first.'},
  // roles
  roleAdmin:{ar:'منسق',en:'Admin'},
  roleMember:{ar:'عضو',en:'Member'},
  roleViewer:{ar:'مشاهد',en:'Viewer'},
  // metrics
  mTotal:{ar:'الإجمالي',en:'Total'},
  mActive:{ar:'قيد التنفيذ',en:'Active'},
  mReview:{ar:'قيد المراجعة',en:'Under review'},
  mDone:{ar:'مكتملة',en:'Done'},
  mBlocked:{ar:'متوقفة',en:'Blocked'},
  // task modal
  newTaskTitle:{ar:'مهمة جديدة',en:'New task'},
  title:{ar:'العنوان',en:'Title'},
  description:{ar:'الوصف',en:'Description'},
  reqSkill:{ar:'المهارة المطلوبة',en:'Required skill'},
  skillPh:{ar:'مثال: تصميم، تحرير فيديو، تقارير',en:'e.g. design, video editing, reports'},
  dueDate:{ar:'تاريخ الاستحقاق',en:'Due date'},
  create:{ar:'إنشاء',en:'Create'},
  cancel:{ar:'إلغاء',en:'Cancel'},
  titleRequired:{ar:'العنوان مطلوب',en:'Title is required'},
  skillMatch:{ar:'مطابقة بالمهارة:',en:'Skill match:'},
  // detail modal
  noDesc:{ar:'لا يوجد وصف',en:'No description'},
  skill:{ar:'المهارة',en:'Skill'},
  files:{ar:'المرفقات',en:'Files'},
  noFiles:{ar:'لا توجد ملفات',en:'No files'},
  upload:{ar:'📎 رفع ملف',en:'📎 Upload'},
  download:{ar:'تحميل',en:'Download'},
  comments:{ar:'التعليقات',en:'Comments'},
  noComments:{ar:'لا توجد تعليقات',en:'No comments'},
  commentPh:{ar:'اكتب تعليقاً...',en:'Write a comment...'},
  send:{ar:'إرسال',en:'Send'},
  activityLog:{ar:'سجل التغييرات',en:'Activity log'},
  deleteTask:{ar:'حذف المهمة',en:'Delete task'},
  confirmDelete:{ar:'حذف هذه المهمة نهائياً؟',en:'Delete this task permanently?'},
  noTasks:{ar:'لا توجد مهام بعد',en:'No tasks yet'},
  cfgMissing:{ar:'أدخل الرابط والمفتاح',en:'Enter the URL and key'},
  // audit actions
  actCreated:{ar:'أنشأ المهمة',en:'created the task'},
  actStatus:{ar:'غيّر الحالة إلى',en:'changed status to'},
  actProgress:{ar:'حدّث التقدم إلى',en:'updated progress to'},
  actMoved:{ar:'نقل إلى',en:'moved to'},
  actUploaded:{ar:'رفع ملف:',en:'uploaded file:'},
};
function t(k){const e=I18N[k];return e?(e[LANG]||e.ar):k;}

const STATUSES=[
  {k:'new',ar:'جديدة',en:'New',c:'var(--new)'},
  {k:'in_progress',ar:'قيد التنفيذ',en:'In progress',c:'var(--prog)'},
  {k:'under_review',ar:'قيد المراجعة',en:'Under review',c:'var(--review)'},
  {k:'done',ar:'مكتملة',en:'Done',c:'var(--done)'},
  {k:'blocked',ar:'متوقفة',en:'Blocked',c:'var(--blocked)'},
];
function stName(k){const s=STATUSES.find(x=>x.k===k);return s?s[LANG]:k;}
const PRI={high:{ar:'عالية',en:'High',cls:'high'},med:{ar:'متوسطة',en:'Medium',cls:'med'},low:{ar:'منخفضة',en:'Low',cls:'low'}};
function priName(k){const p=PRI[k]||PRI.med;return p[LANG];}

/* ============ LANGUAGE ============ */
function applyLang(){
  const root=document.getElementById('htmlRoot');
  root.lang=LANG; root.dir=(LANG==='ar')?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-title]').forEach(el=>{el.title=t(el.getAttribute('data-i18n-title'));});
  const eph={email:'email',password:'password'};
  const skillEl=document.getElementById('mSkill'); // if a modal is open
  if(skillEl) skillEl.placeholder=t('skillPh');
  // header compact toggle shows the OTHER language
  const lb=document.getElementById('langBtn'); if(lb) lb.textContent=(LANG==='ar')?'EN':'ع';
  // login pills: highlight the active language
  document.querySelectorAll('.lang-pill').forEach(p=>{
    p.classList.toggle('on', p.getAttribute('data-lang')===LANG);
  });
  replayLogoAnimation();
  // re-render dynamic content if logged in
  if(me){ uRole.textContent=t('role'+me.role.charAt(0).toUpperCase()+me.role.slice(1)); render(); }
}
// Restart the login entry animations from the beginning.
// - The card replays its rise-up motion (remove class, force reflow, re-add).
// - The logo replays its draw+pop+float (cloning resets its animation state).
function replayLogoAnimation(){
  const card=document.querySelector('.login-card');
  if(card){
    card.style.animation='none';
    void card.offsetWidth;      // force reflow so the browser restarts the animation
    card.style.animation='';
  }
  const logo=document.querySelector('.login-logo');
  if(logo){
    const fresh=logo.cloneNode(true);
    logo.parentNode.replaceChild(fresh,logo);
  }
}
function setLang(lang){
  if(lang!==LANG){ LANG=lang; localStorage.setItem('sfc_lang',LANG); applyLang(); }
}
function toggleLang(){
  setLang(LANG==='ar'?'en':'ar');
}

function saveConfig(){
  const url=cfgUrl.value.trim(), key=cfgKey.value.trim();
  if(!url||!key){alert(t('cfgMissing'));return;}
  cfg={url,key}; localStorage.setItem('sfc_task_cfg',JSON.stringify(cfg));
  location.reload();
}

function initSupabase(){
  if(!cfg){setup.style.display='block';return false;}
  SB=supabase.createClient(cfg.url,cfg.key);
  return true;
}

/* ============ AUTH ============ */
async function doLogin(){
  loginErr.textContent='';
  const {error}=await SB.auth.signInWithPassword({email:email.value.trim(),password:password.value});
  if(error){loginErr.textContent=error.message;return;}
  await boot();
}
async function doLogout(){await SB.auth.signOut();location.reload();}

async function boot(){
  const {data:{user}}=await SB.auth.getUser();
  if(!user){login.style.display='flex';app.style.display='none';return;}
  // load my profile
  const {data:prof}=await SB.from('profiles').select('*').eq('id',user.id).single();
  me={...user,...(prof||{})};
  uName.textContent=me.full_name||user.email;
  uRole.textContent=t('role'+me.role.charAt(0).toUpperCase()+me.role.slice(1));
  login.style.display='none'; app.style.display='block';
  if(me.role==='viewer'||me.role==='member'){newBtn.classList.add('hidden');}
  await loadData(); render();
}

/* ============ DATA ============ */
async function loadMembers(){
  // Profiles rarely change — fetched once at login, not on every action.
  const {data:mem}=await SB.from('profiles').select('id,full_name,role,skills,email').order('full_name');
  members=mem||[];
  const seesAll = (me.role==='admin'||me.role==='viewer');
  // The "All people" filter only makes sense when you can see everyone's tasks.
  const fa=fAssignee;
  if(seesAll){
    const prevFilter=fa.value;                 // remember the current selection
    fa.style.display='';
    fa.innerHTML=`<option value="">${t('allPeople')}</option>`;
    members.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.full_name;fa.appendChild(o);});
    if(prevFilter && members.some(m=>m.id===prevFilter)) fa.value=prevFilter;
  }else{
    fa.style.display='none';   // members only see their own tasks — filter is pointless
    fa.value='';
  }
}
async function loadTasks(){
  // Members load only their own assigned tasks; admin/viewer load all.
  // (RLS enforces this server-side too — this just matches the UI.)
  const seesAll = (me.role==='admin'||me.role==='viewer');
  let q=SB.from('tasks').select('*').order('created_at',{ascending:false});
  if(!seesAll) q=q.eq('assignee',me.id);
  const {data:tk}=await q;
  tasks=tk||[];
}
async function loadData(){
  // Boot-time load: both queries in parallel (one round-trip of waiting, not two).
  await Promise.all([loadMembers(),loadTasks()]);
}

function memberName(id){const m=members.find(x=>x.id===id);return m?m.full_name:'—';}
function initials(name){return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}

/* ============ RENDER ============ */
function setView(v){currentView=v;
  tabKanban.classList.toggle('active',v==='kanban');
  tabTable.classList.toggle('active',v==='table');
  kanban.classList.toggle('hidden',v!=='kanban');
  table.classList.toggle('hidden',v!=='table');
  render();
}

function filtered(){
  const a=fAssignee.value, p=fPriority.value;
  return tasks.filter(t=>(!a||t.assignee===a)&&(!p||t.priority===p));
}

function render(){
  const list=filtered();
  // metrics
  metrics.innerHTML='';
  const stats=[
    {l:t('mTotal'),n:list.length},
    {l:t('mActive'),n:list.filter(t=>t.status==='in_progress').length},
    {l:t('mReview'),n:list.filter(t=>t.status==='under_review').length},
    {l:t('mDone'),n:list.filter(t=>t.status==='done').length},
    {l:t('mBlocked'),n:list.filter(t=>t.status==='blocked').length},
  ];
  stats.forEach(s=>{const d=document.createElement('div');d.className='metric';d.innerHTML=`<div class="n">${s.n}</div><div class="l">${s.l}</div>`;metrics.appendChild(d);});

  if(currentView==='kanban') renderKanban(list); else renderTable(list);
}

function renderKanban(list){
  kanban.innerHTML='';
  STATUSES.forEach(s=>{
    const col=document.createElement('div');col.className='col';col.dataset.status=s.k;
    const items=list.filter(t=>t.status===s.k);
    col.innerHTML=`<div class="col-head" style="border-color:${s.c};color:${s.c}">${s[LANG]}<span class="cnt">${items.length}</span></div>`;
    items.forEach(t=>col.appendChild(cardEl(t)));
    // drag targets
    col.ondragover=e=>{e.preventDefault();col.classList.add('drag-over');};
    col.ondragleave=()=>col.classList.remove('drag-over');
    col.ondrop=e=>{e.preventDefault();col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('id'); moveTask(id,s.k);};
    kanban.appendChild(col);
  });
}

function cardEl(t){
  const d=document.createElement('div');d.className='card';
  d.draggable=(me.role!=='viewer');
  d.ondragstart=e=>e.dataTransfer.setData('id',t.id);
  d.onclick=()=>openDetail(t.id);
  const pr=PRI[t.priority]||PRI.med;
  d.innerHTML=`<div class="t">${esc(t.title)}</div>
    <div class="meta">
      <span class="avatar">${initials(memberName(t.assignee))}</span>
      <span>${esc(memberName(t.assignee))}</span>
      <span class="pri ${pr.cls}">${pr[LANG]}</span>
      ${t.due_date?`<span>📅 ${t.due_date}</span>`:''}
    </div>
    <div class="prog-bar"><i style="width:${t.progress||0}%"></i></div>`;
  return d;
}

function renderTable(list){
  tbody.innerHTML='';
  const emptyMsg=t('noTasks');
  list.forEach(row=>{
    const s=STATUSES.find(x=>x.k===row.status)||STATUSES[0];
    const pr=PRI[row.priority]||PRI.med;
    const tr=document.createElement('tr');tr.className='row';tr.onclick=()=>openDetail(row.id);
    tr.innerHTML=`<td><b>${esc(row.title)}</b></td>
      <td><span class="avatar" style="display:inline-flex;vertical-align:middle">${initials(memberName(row.assignee))}</span> ${esc(memberName(row.assignee))}</td>
      <td><span class="pri ${pr.cls}">${pr[LANG]}</span></td>
      <td><span class="status-tag" style="background:${s.c}">${s[LANG]}</span></td>
      <td><div class="prog-bar" style="width:80px"><i style="width:${row.progress||0}%"></i></div></td>
      <td>${row.due_date||'—'}</td>`;
    tbody.appendChild(tr);
  });
  if(!list.length) tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">${emptyMsg}</td></tr>`;
}

/* ============ TASK MODAL (create) ============ */
function openTaskModal(){
  const memOpts=members.filter(m=>m.role==='member'||m.role==='admin').map(m=>`<option value="${m.id}">${esc(m.full_name)}${m.skills?' · '+esc(m.skills):''}</option>`).join('');
  modalHost.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${t('newTaskTitle')} <button class="close" onclick="closeModal()">×</button></h3>
    <div class="field"><label>${t('title')}</label><input id="mTitle"></div>
    <div class="field"><label>${t('description')}</label><textarea id="mDesc"></textarea></div>
    <div class="field"><label>${t('reqSkill')}</label><input id="mSkill" oninput="suggestMatch()" placeholder="${t('skillPh')}"></div>
    <div id="matchBox"></div>
    <div class="grid2">
      <div class="field"><label>${t('assignee')}</label><select id="mAssignee">${memOpts}</select></div>
      <div class="field"><label>${t('priority')}</label><select id="mPriority"><option value="high">${priName('high')}</option><option value="med" selected>${priName('med')}</option><option value="low">${priName('low')}</option></select></div>
    </div>
    <div class="field"><label>${t('dueDate')}</label><input id="mDue" type="date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="createTask()">${t('create')}</button>
      <button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>
    </div>
  </div></div>`;
}
function suggestMatch(){
  const skill=(mSkill.value||'').trim().toLowerCase();
  if(!skill){matchBox.innerHTML='';return;}
  const hits=members.filter(m=>(m.skills||'').toLowerCase().includes(skill)&&(m.role==='member'||m.role==='admin'));
  const sep=(LANG==='ar')?'، ':', ';
  matchBox.innerHTML=hits.length?`<div class="match">💡 ${t('skillMatch')} ${hits.map(h=>esc(h.full_name)).join(sep)}</div>`:'';
  if(hits.length){mAssignee.value=hits[0].id;}
}
async function createTask(){
  const title=mTitle.value.trim(); if(!title){alert(t('titleRequired'));return;}
  const row={title,description:mDesc.value.trim(),assignee:mAssignee.value||null,
    priority:mPriority.value,status:'new',progress:0,due_date:mDue.value||null,
    required_skill:mSkill.value.trim()||null,created_by:me.id};
  const {data,error}=await SB.from('tasks').insert(row).select().single();
  if(error){alert(error.message);return;}
  logAudit(data.id,t('actCreated'));           // fire-and-forget: don't block the UI
  closeModal(); await loadTasks(); render();
}

/* ============ DETAIL MODAL ============ */
async function openDetail(id){
  const tk=tasks.find(x=>x.id===id); if(!tk)return;
  const s=STATUSES.find(x=>x.k===tk.status)||STATUSES[0];
  const canEdit=me.role==='admin'||(me.role==='member'&&tk.assignee===me.id);
  const pr=PRI[tk.priority]||PRI.med;
  const statusOpts=STATUSES.map(x=>`<option value="${x.k}" ${x.k===tk.status?'selected':''}>${x[LANG]}</option>`).join('');
  modalHost.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${esc(tk.title)} <button class="close" onclick="closeModal()">×</button></h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">${esc(tk.description||t('noDesc'))}</p>
    <div class="detail-row"><span class="k">${t('assignee')}</span><span>${esc(memberName(tk.assignee))}</span></div>
    <div class="detail-row"><span class="k">${t('priority')}</span><span class="pri ${pr.cls}">${pr[LANG]}</span></div>
    <div class="detail-row"><span class="k">${t('due')}</span><span>${tk.due_date||'—'}</span></div>
    ${tk.required_skill?`<div class="detail-row"><span class="k">${t('skill')}</span><span class="skill-tag">${esc(tk.required_skill)}</span></div>`:''}

    ${canEdit?`
    <div class="field" style="margin-top:14px"><label>${t('status')}</label><select id="dStatus" onchange="updateStatus('${tk.id}',this.value)">${statusOpts}</select></div>
    <div class="field"><label>${t('progress')}: <b id="progLbl">${tk.progress||0}%</b></label>
      <div class="range-row"><input type="range" min="0" max="100" step="5" value="${tk.progress||0}" oninput="progLbl.textContent=this.value+'%'" onchange="updateProgress('${tk.id}',this.value)"></div></div>
    `:`
    <div class="detail-row"><span class="k">${t('status')}</span><span class="status-tag" style="background:${s.c}">${s[LANG]}</span></div>
    <div class="detail-row"><span class="k">${t('progress')}</span><span>${tk.progress||0}%</span></div>
    `}

    <div style="margin-top:16px"><label style="font-size:13px;color:var(--muted)">${t('files')}</label>
      <div id="fileList" style="margin:8px 0"></div>
      ${canEdit?`<input type="file" id="fileInput" style="display:none" onchange="uploadFile('${tk.id}')"><button class="btn sec sm" onclick="fileInput.click()" style="width:auto">${t('upload')}</button>`:''}
    </div>

    <div style="margin-top:18px"><label style="font-size:13px;color:var(--muted)">${t('comments')}</label>
      <div id="commentList" style="margin:8px 0"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="cInput" placeholder="${t('commentPh')}" style="flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--text)">
        <button class="btn sm" onclick="addComment('${tk.id}')" style="width:auto">${t('send')}</button>
      </div>
    </div>

    <div style="margin-top:18px"><label style="font-size:13px;color:var(--muted)">${t('activityLog')}</label>
      <div id="logList" style="margin:8px 0"></div>
    </div>
    ${me.role==='admin'?`<div class="modal-actions"><button class="btn ghost" onclick="deleteTask('${tk.id}')" style="color:var(--orange);border-color:var(--orange)">${t('deleteTask')}</button></div>`:''}
  </div></div>`;
  loadFiles(tk.id); loadComments(tk.id); loadLog(tk.id);
}

async function updateStatus(id,val){
  await SB.from('tasks').update({status:val}).eq('id',id);
  logAudit(id,`${t('actStatus')} ${stName(val)}`);
  await loadTasks(); render();
}
async function updateProgress(id,val){
  await SB.from('tasks').update({progress:parseInt(val)}).eq('id',id);
  logAudit(id,`${t('actProgress')} ${val}%`);
  await loadTasks(); render();
}
async function moveTask(id,status){
  if(me.role==='viewer')return;
  const tk=tasks.find(x=>x.id===id); if(!tk||tk.status===status)return;
  if(me.role==='member'&&tk.assignee!==me.id)return;
  await SB.from('tasks').update({status}).eq('id',id);
  logAudit(id,`${t('actMoved')} ${stName(status)}`);
  await loadTasks(); render();
}
async function deleteTask(id){
  if(!confirm(t('confirmDelete')))return;
  await SB.from('tasks').delete().eq('id',id);
  closeModal(); await loadTasks(); render();
}

/* ---- files ---- */
async function loadFiles(taskId){
  const {data}=await SB.from('task_files').select('*').eq('task_id',taskId).order('created_at');
  fileList.innerHTML=(data||[]).map(f=>`<div class="file-item">📄 ${esc(f.name)} <a href="${f.url}" target="_blank">${t('download')}</a></div>`).join('')||`<span style="font-size:12px;color:var(--muted)">${t('noFiles')}</span>`;
}
async function uploadFile(taskId){
  const file=fileInput.files[0]; if(!file)return;
  const path=`${taskId}/${Date.now()}_${file.name}`;
  const {error}=await SB.storage.from('task-files').upload(path,file);
  if(error){alert(error.message);return;}
  const {data:{publicUrl}}=SB.storage.from('task-files').getPublicUrl(path);
  await SB.from('task_files').insert({task_id:taskId,name:file.name,url:publicUrl,uploaded_by:me.id});
  logAudit(taskId,`${t('actUploaded')} ${file.name}`);
  loadFiles(taskId);
}

/* ---- comments ---- */
async function loadComments(taskId){
  const {data}=await SB.from('comments').select('*').eq('task_id',taskId).order('created_at');
  commentList.innerHTML=(data||[]).map(c=>`<div class="comment"><span class="who">${esc(memberName(c.user_id))}</span> <span class="when">${fmtDate(c.created_at)}</span><div>${esc(c.body)}</div></div>`).join('')||`<span style="font-size:12px;color:var(--muted)">${t('noComments')}</span>`;
}
async function addComment(taskId){
  const body=cInput.value.trim(); if(!body)return;
  await SB.from('comments').insert({task_id:taskId,user_id:me.id,body});
  cInput.value=''; loadComments(taskId);
}

/* ---- audit log ---- */
async function logAudit(taskId,action){
  await SB.from('audit_log').insert({task_id:taskId,user_id:me.id,action});
}
async function loadLog(taskId){
  const {data}=await SB.from('audit_log').select('*').eq('task_id',taskId).order('created_at',{ascending:false}).limit(15);
  logList.innerHTML=(data||[]).map(l=>`<div class="log-item">• ${esc(memberName(l.user_id))} ${esc(l.action)} — ${fmtDate(l.created_at)}</div>`).join('')||'<span style="font-size:12px;color:var(--muted)">—</span>';
}

/* ============ HELPERS ============ */
function closeModal(){modalHost.innerHTML='';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(d){if(!d)return'';const x=new Date(d);const loc=(LANG==='ar')?'ar-SA':'en-GB';return x.toLocaleDateString(loc)+' '+x.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});}
function toggleTheme(){const b=document.body;const th=b.dataset.theme==='dark'?'light':'dark';b.dataset.theme=th;localStorage.setItem('sfc_theme',th);replayLogoAnimation();}

/* ============ START ============ */
(function(){
  const savedTheme=localStorage.getItem('sfc_theme'); if(savedTheme)document.body.dataset.theme=savedTheme;
  applyLang();
  if(initSupabase()){ boot(); }
  ['email','password'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
})();
</script>
